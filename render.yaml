services:
  - type: web
    name: sage-api
    runtime: python
    plan: starter  # $7/mo instance (prevents sleep, enables disk)
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn sage_api:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: STRIPE_API_KEY
        sync: false
      - key: SAGE_API_KEY
        sync: false
    disk:
      name: sage-data
      mountPath: /data
      sizeGB: 1
